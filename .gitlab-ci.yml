stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

cache:
  key:
    files:
      - pom.xml
  paths:
    - .m2/repository

unit-test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/*.xml

dependency-check:
  stage: test
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mkdir -p ~/.m2
    - |
      cat > ~/.m2/settings.xml <<EOF
      <settings>
        <servers>
          <server>
            <id>ossindex</id>
            <username>${OSS_INDEX_USERNAME}</username>
            <password>${OSS_INDEX_TOKEN}</password>
          </server>
        </servers>
      </settings>
      EOF
    - mvn $MAVEN_CLI_OPTS -DnvdApiKey=$NVD_API_KEY org.owasp:dependency-check-maven:check
  artifacts:
    when: always
    paths:
      - target/dependency-check-report.html
    expire_in: 28 days

trivy:
  stage: test
  image:
    name: aquasec/trivy:0.62.1
    entrypoint: [""]
  variables:
    TRIVY_CACHE_DIR: .trivycache
  cache:
    key: trivy
    paths:
      - .trivycache/
  script:
    - trivy fs --exit-code 1 --no-progress --format json --output trivy-report.json .
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 28 days

# included in test stage
include:
  - template: Jobs/SAST.gitlab-ci.yml
